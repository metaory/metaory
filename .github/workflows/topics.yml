name: readme-topics
run-name: Update README.md with repos categorized by topic
on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: metaory/github-profile-pinned-action@master
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          email: metaory@gmail.com
          topics: |-
            api
            automation
            challenge
            cli
            github-actions
            npm-package
            theme
